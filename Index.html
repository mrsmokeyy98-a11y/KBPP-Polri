<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Profil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      padding: 20px;
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    .social {
      margin-top: 15px;
    }

    .social a {
      text-decoration: none;
      margin: 5px;
      display: inline-block;
      padding: 10px 15px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }

    .wa { background: #25D366; }
    .ig { background: #E1306C; }
    .fb { background: #1877F2; }
    .yt { background: #FF0000; }

    .social a:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://via.placeholder.com/100" class="profile-img">
    <h2>MUH. REZA RAMADHAN</h2>
    <p>KBPP POLRI / INTELKAM</p>

    <div class="social">
      <a href="https://wa.me/6282192294108" class="wa">WhatsApp</a>
      <a href="https://instagram.com/_Rzhrmdhn" class="ig">Instagram</a>
      <a href="https://facebook.com/ムハンマド•レザ•ラマダン" class="fb">Facebook</a>
      <a href="https://youtube.com" class="yt">YouTube</a>
    </div>
  </div>

</body>
</html>
